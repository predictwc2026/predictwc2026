<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict WC 2026</title>
</head>
<body>
    <div id="prediction-form">
        <input type="text" id="name-input" placeholder="Full Name">
        <input type="email" id="email-input" placeholder="Email">
        <input type="number" id="team1" placeholder="Team 1 Score">
        <input type="number" id="team2" placeholder="Team 2 Score">
        <button onclick="prepareSubmission()">Submit Prediction</button>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      const SUPABASE_URL = 'https://glrczpyhppinotlssmrk.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_zLJKzsCkRQc97Ce-Rm4xxA_Ono7OlFa';
      const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let dataPayload = null;

      window.prepareSubmission = function() {
        // Now this finds the elements because they are in the HTML above
        const emailEl = document.getElementById('email-input');
        const nameEl = document.getElementById('name-input');
        const t1El = document.getElementById('team1');
        const t2El = document.getElementById('team2');

        if (!emailEl || !nameEl) {
            alert("Error: Form elements not found!");
            return;
        }

        dataPayload = {
          email: emailEl.value,
          full_name: nameEl.value,
          team1_score: t1El.value,
          team2_score: t2El.value
        };
        
        executeFinalValidatedSubmission();
      };

      async function executeFinalValidatedSubmission() {
        try {
          const { error: insertError } = await _supabase.from('predictions').insert([dataPayload]);
          if (insertError) throw new Error("SQL Insert: " + insertError.message);

          const response = await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify(dataPayload),
          });

          if (!response.ok) throw new Error("Email function failed");

          alert("🎉 Prediction submitted and confirmation email sent!");
        } catch (err) {
          alert("System error: " + err.message);
        }
      }
    </script>
</body>
</html>
